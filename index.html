<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算アプリ</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h2 { text-align: center; }

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<h2>計算アプリ</h2>

<form id="form">
  <input type="number" name="B" placeholder="B">
  <input type="number" name="S" placeholder="S">
  <input type="number" name="T1" placeholder="T1">
  <input type="number" name="T2" placeholder="T2">

  <button type="submit">計算</button>
</form>

<div class="result">
  <div>O1: <span id="O1">-</span></div>
  <div>O2: <span id="O2">-</span></div>
  <div>結果: <span id="result">-</span></div>
</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ67cBgq7Kluhj7U1ZqkAB5BOA1rGZQDc8Dd1JkwbOuGt0wCsKxZaPccxQNEWxA9Yc/exec";

document.getElementById("form").onsubmit = function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  const B = Number(formData.get("B"));
  const S = Number(formData.get("S"));
  const T1 = Number(formData.get("T1"));
  const T2 = Number(formData.get("T2"));

  if ([B,S,T1,T2].some(v => isNaN(v))) {
    alert("すべて入力してください");
    return;
  }

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ B, S, T1, T2 })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("O1").textContent = data.O1;
    document.getElementById("O2").textContent = data.O2;

    document.getElementById("result").textContent =
      S - B + Number(data.O1) + Number(data.O2);
  })
  .catch(() => {
    alert("通信エラー（CORS制限の可能性）");
  });
};
</script>

</body>
</html>
