<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PWA</title>
</head>

<body>

<h2>計算</h2>

<input id="B" type="number" placeholder="B">
<input id="S" type="number" placeholder="S">
<input id="T1" type="number" placeholder="T1">
<input id="T2" type="number" placeholder="T2">

<button onclick="calc()">計算</button>

<hr>

<div>O1: <span id="O1">-</span></div>
<div>O2: <span id="O2">-</span></div>
<div>result: <span id="result">-</span></div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycby3p9KLSlESfF-2BmPv7B4n995E2Gu4pNjhpitk-Y3Zfen6jvIAdbe63NTmajSxBbgz/exec"
async function calc() {

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T1 = Number(document.getElementById("T1").value);
  const T2 = Number(document.getElementById("T2").value);

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ B, S, T1, T2 })
  });

  const data = await res.json();

  const O1 = Number(data.O1);
  const O2 = Number(data.O2);

  const result = S - B + O1 + O2;

  document.getElementById("O1").textContent = O1;
  document.getElementById("O2").textContent = O2;
  document.getElementById("result").textContent = result;
}

</script>

</body>
</html>
