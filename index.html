<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWA 計算UI</title>

<style>
body {
  font-family: sans-serif;
  max-width: 500px;
  margin: auto;
  padding: 16px;
}

h2 {
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  font-size: 16px;
}

.card {
  margin-top: 20px;
  padding: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>計算アプリ（PWA35）</h2>

<form id="form">
  <input type="number" name="B" placeholder="B（入力値）" required>
  <input type="number" name="S" placeholder="S（入力値）" required>
  <input type="number" name="T1" placeholder="T1" required>
  <input type="number" name="T2" placeholder="T2" required>

  <button type="submit">計算</button>
</form>

<div class="card">
  <div>base: <span id="base">-</span></div>
  <div>O1: <span id="O1">-</span></div>
  <div>O2: <span id="O2">-</span></div>
  <hr>
  <div>result: <span id="result">-</span></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz8tl0iINlHPSYINHOQpF274kQ8mEiku3XO_g3AtOXsACCzldUJyIA5eZ8Al_UTr41J/exec";

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = new FormData(e.target);

  const payload = {
    B: Number(form.get("B")),
    S: Number(form.get("S")),
    T1: Number(form.get("T1")),
    T2: Number(form.get("T2"))
  };

  // 入力チェック
  if (Object.values(payload).some(v => isNaN(v))) {
    alert("入力エラー");
    return;
  }

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    // GASから返ってくる想定：
    // base, O1, O2, result

    document.getElementById("base").textContent = data.base;
    document.getElementById("O1").textContent = data.O1;
    document.getElementById("O2").textContent = data.O2;
    document.getElementById("result").textContent = data.result;

  } catch (err) {
    alert("通信エラー");
  }
});
</script>

</body>
</html>
